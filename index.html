<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0ea5e9"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Mon TCC"/>
<title>Mon TCC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky:#0ea5e9;--sky-dark:#0284c7;--sky-deeper:#0369a1;
  --sky-light:#e0f2fe;--sky-mid:#bae6fd;--sky-soft:#f0f9ff;
  --bg:#f0f9ff;--card:#fff;--card2:#f8fafc;
  --text:#0c4a6e;--text2:#0369a1;--text3:#64748b;
  --border:#bae6fd;--border2:#7dd3fc;
  --green:#059669;--red:#dc2626;--orange:#d97706;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;font-size:16px}
.app{max-width:560px;margin:0 auto;padding:20px 16px 40px;min-height:100vh}

h1{font-size:1.6rem;font-weight:800;text-align:center;color:var(--sky-deeper);margin-bottom:4px}
h2{font-size:1.15rem;font-weight:700;color:var(--sky-deeper);margin-bottom:8px}
.sub{color:var(--text3);font-size:.875rem;margin-bottom:12px;line-height:1.5}

/* Cards */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px}
.card2{background:var(--sky-soft);border:1.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}

/* Buttons */
.btn{width:100%;padding:16px;border:none;border-radius:16px;font-size:1rem;font-weight:700;cursor:pointer;transition:.15s;display:block;text-align:center;letter-spacing:.01em}
.btn:active{transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,var(--sky),var(--sky-deeper));color:#fff;box-shadow:0 4px 14px rgba(14,165,233,.3)}
.btn-secondary{background:var(--card);color:var(--sky-deeper);border:1.5px solid var(--border2)}
.btn-secondary:hover{background:var(--sky-light)}
.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 4px 14px rgba(5,150,105,.25)}
.btn-danger{background:#fef2f2;color:var(--red);border:1.5px solid #fecaca;font-size:.875rem}
.btn:disabled{opacity:.4;cursor:default;transform:none}
.btn-sm{padding:8px 16px;font-size:.8rem;border-radius:12px;border:1.5px solid var(--border2);background:var(--card);color:var(--sky-deeper);cursor:pointer;font-weight:600}
.btn-xs{padding:6px 12px;font-size:.75rem;border-radius:10px;border:1.5px solid var(--border);background:var(--sky-soft);color:var(--sky-deeper);cursor:pointer;font-weight:600}
.btn-add{background:var(--sky);color:#fff;border:none;border-radius:12px;padding:10px 18px;cursor:pointer;font-weight:700;font-size:.875rem;white-space:nowrap}

/* Inputs */
textarea{width:100%;background:var(--sky-soft);border:1.5px solid var(--border);border-radius:14px;padding:14px;color:var(--text);font-size:1rem;resize:none;outline:none;font-family:inherit;line-height:1.6;transition:.15s}
textarea:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(14,165,233,.15)}
input[type=range]{width:100%;accent-color:var(--sky);margin:10px 0;height:6px}
.text-input{width:100%;background:var(--sky-soft);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:.95rem;outline:none;font-family:inherit;transition:.15s}
.text-input:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(14,165,233,.15)}

/* Tags */
.tag{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:20px;font-size:.8rem;cursor:pointer;margin:3px;border:1.5px solid var(--border);font-weight:600;transition:.15s}
.tag-off{background:var(--card);color:var(--text2)}
.tag-off:hover{background:var(--sky-light);border-color:var(--sky)}
.tag-on{background:var(--sky);color:#fff;border-color:var(--sky)}

/* Progress */
.progress-wrap{margin-bottom:18px}
.progress-header{display:flex;justify-content:space-between;font-size:.75rem;color:var(--text3);margin-bottom:6px;font-weight:600}
.progress-bar{background:var(--sky-mid);border-radius:99px;height:8px;overflow:hidden}
.progress-fill{height:8px;border-radius:99px;background:linear-gradient(90deg,var(--sky),var(--sky-deeper));transition:width .4s ease}

/* AI Box */
.ai-box{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1.5px solid #93c5fd;border-radius:14px;padding:14px;margin-bottom:14px;font-size:.875rem}
.ai-label{font-size:.7rem;color:#1d4ed8;margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.ai-text{color:#1e3a5f;white-space:pre-wrap;line-height:1.6}
.ai-use{background:none;border:none;color:#2563eb;font-size:.75rem;text-decoration:underline;cursor:pointer;margin-top:6px;font-weight:600}

/* Nav */
.nav-row{display:flex;gap:12px;margin-top:20px}
.nav-row .btn{flex:1}

/* Stats */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:14px;text-align:center}
.stat-val{font-size:1.6rem;font-weight:800}

/* Records */
.record-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;transition:.15s}
.record-card:hover{border-color:var(--sky);background:var(--sky-soft)}
.record-date{font-size:.75rem;color:var(--text3);margin-bottom:4px;font-weight:600}
.record-pensee{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.record-meta{font-size:.8rem;color:var(--text2);margin-top:6px}

/* Home buttons */
.home-btn{width:100%;padding:18px 20px;border-radius:18px;font-size:1rem;font-weight:700;cursor:pointer;margin-bottom:12px;text-align:left;display:flex;align-items:center;gap:12px;transition:.15s}
.home-btn:hover{transform:translateY(-1px)}
.home-btn-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}

/* Misc */
.section-title{font-size:.85rem;font-weight:700;margin:16px 0 8px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.api-input{background:var(--sky-soft);border:1.5px solid var(--border);border-radius:12px;padding:12px;color:var(--text);width:100%;font-size:.9rem;outline:none;margin-bottom:8px;font-family:inherit}
.api-input:focus{border-color:var(--sky)}
.back-btn{background:none;border:none;color:var(--text2);font-size:.875rem;cursor:pointer;margin-bottom:18px;display:flex;align-items:center;gap:6px;font-weight:600;padding:0}
.back-btn:hover{color:var(--sky-deeper)}
.italic{font-style:italic;color:var(--text2)}
.wrap{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.label{font-size:.8rem;color:var(--text2);margin-bottom:6px;display:block;font-weight:600}
.strong{color:var(--sky-deeper);font-weight:700}
.mb8{margin-bottom:8px}
.mb12{margin-bottom:12px}
.mb16{margin-bottom:16px}
.mt8{margin-top:8px}
.mt12{margin-top:12px}
.mt16{margin-top:16px}
.green{color:var(--green)}
.orange{color:var(--orange)}
.red{color:var(--red)}

/* Badge */
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.7rem;font-weight:700}
.badge-blue{background:var(--sky-light);color:var(--sky-deeper)}
.badge-green{background:#d1fae5;color:#065f46}

/* Divider */
.divider{height:1px;background:var(--border);margin:16px 0}

/* Norme clickable */
.norme-card{background:var(--sky-soft);border:1.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;transition:.15s}
.norme-card:hover{border-color:var(--sky);background:var(--sky-light)}
.norme-hint{font-size:.7rem;color:var(--sky);margin-top:4px;font-weight:600}

/* Header decoration */
.header-badge{background:linear-gradient(135deg,var(--sky-light),var(--sky-mid));border-radius:16px;padding:16px;text-align:center;margin-bottom:24px;border:1.5px solid var(--border)}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const CARTE_DEFAULT = {
  valeurs:["Travail","Respect","Famille","Discipline","Amour","Effort","Détermination"],
  forces:["Persévérant","Discipliné","Physique travaillé par le sport","Curieux","Intelligent","Déterminé","Ambitieux","Empathique"],
  reussites:["70 jours sans alcool depuis février","Sportif — 5 séances/semaine","54 livres lus l'année passée","Lecteur quotidien à haute voix","Fonctionnaire des Nations Unies","A combattu et combat la dépression","Construit sa propre maison","Créé son propre outil TCC","Appris à parler en public","Se construit chaque jour par la discipline"],
  croyances:["Je suis capable — je le prouve chaque jour","J'ai du respect pour moi-même","Je suis fier de moi","Je fais ce que je dis","Je peux tenir un engagement","Je peux m'en sortir","L'opinion des autres ne m'arrête pas","Les pressions internes ne m'arrêtent pas"],
  engagements:["Me construire émotionnellement, physiquement, intellectuellement","Fonder une famille","Être en santé mentale et physique","Construire ma carrière","Investir dans mes passions"],
  fiertes:[],obstacles:[],competences:[],phrases:[]
};

const DISTORSION_DATA={
  "Tout ou rien":{
    questions:["Y a-t-il des nuances ou des situations intermédiaires que tu ignores ?","Sur une échelle de 0 à 100, où se situe vraiment cette situation ?","Est-ce vraiment tout noir ou tout blanc, ou y a-t-il du gris ?"],
    normes:["La réalité existe rarement en termes absolus — elle est faite de nuances.","Penser en tout ou rien amplifie la souffrance sans refléter la réalité.","L'échec partiel n'est pas un échec total."]
  },
  "Surgénéralisation":{
    questions:["Est-ce que cette situation s'est vraiment passée à chaque fois, ou seulement parfois ?","Quelles sont les exceptions à cette règle que tu t'imposes ?","Un seul événement peut-il vraiment définir une règle universelle ?"],
    normes:["Un événement isolé ne constitue pas une règle universelle.","Tirer une conclusion générale d'un seul fait est une erreur logique.","Les exceptions existent toujours — les ignorer fausse le jugement."]
  },
  "Filtre négatif":{
    questions:["Qu'est-ce qui s'est bien passé dans cette situation que tu ne mentionnes pas ?","Si tu devais noter objectivement cette situation, quel score lui donnerais-tu ?","Pourquoi ton attention se fixe-t-elle uniquement sur le négatif ?"],
    normes:["Une situation contient toujours des éléments positifs et négatifs.","Se focaliser uniquement sur le négatif déforme la réalité.","Un jugement équilibré prend en compte l'ensemble des faits."]
  },
  "Dévalorisation du positif":{
    questions:["Pourquoi minimises-tu ce qui s'est bien passé ?","Si quelqu'un d'autre avait réussi ça, dirais-tu que c'est sans importance ?","Quelle preuve as-tu que ce positif ne compte pas ?"],
    normes:["Les réussites méritent d'être reconnues au même titre que les échecs.","Minimiser le positif est une distorsion, pas une lucidité.","Ce qui est bien accompli a une valeur réelle, indépendamment du contexte."]
  },
  "Lecture des pensées":{
    questions:["As-tu demandé directement à cette personne ce qu'elle pense vraiment ?","Quelle preuve concrète as-tu de ce que tu supposes ?","Est-il possible que tu projettes tes propres craintes sur cette personne ?"],
    normes:["Personne ne peut lire dans les pensées des autres.","Une supposition n'est pas un fait — seule la vérification compte.","Les interprétations sans preuve sont des constructions mentales."]
  },
  "Prédiction négative":{
    questions:["Quelle est la probabilité réelle que le pire se produise ?","Combien de fois as-tu prédit le pire et ça ne s'est pas passé ainsi ?","Quels scénarios positifs ou neutres sont possibles ?"],
    normes:["Le futur est incertain — les prédictions négatives ne sont pas des faits.","Anticiper le pire sans preuve est une erreur de raisonnement.","Les issues positives sont aussi probables que les négatives."]
  },
  "Catastrophisme":{
    questions:["Quelle est la pire chose réaliste qui puisse arriver, et peux-tu y faire face ?","Dans 5 ans, est-ce que cet événement aura encore autant d'importance ?","As-tu déjà traversé des situations difficiles et t'en es sorti ?"],
    normes:["Exagérer la gravité d'une situation augmente la souffrance sans changer les faits.","La plupart des situations difficiles sont surmontables.","La capacité humaine à s'adapter est généralement sous-estimée."]
  },
  "Raisonnement émotionnel":{
    questions:["Ce que tu ressens est-il une preuve de ce qui est vrai ?","Peux-tu trouver des faits objectifs qui contredisent ce que tu ressens ?","Tes émotions t'informent-elles ou te trompent-elles ici ?"],
    normes:["Une émotion est une information, pas une vérité absolue.","Ressentir quelque chose ne le rend pas réel ou vrai.","Les faits existent indépendamment de ce qu'on ressent."]
  },
  "Les « je dois »":{
    questions:["Qui a décidé de cette règle que tu t'imposes ?","Que se passe-t-il réellement si tu ne respectes pas ce 'je dois' ?","Cette règle est-elle flexible ou rigide — et pourquoi ?"],
    normes:["Les règles rigides créent de la souffrance inutile.","Les attentes perfectionnistes sont rarement réalistes ou utiles.","La flexibilité est une force, pas une faiblesse."]
  },
  "Étiquetage":{
    questions:["Est-ce qu'une action ou une erreur définit totalement qui tu es ?","Utiliserais-tu cette étiquette pour définir quelqu'un d'autre dans la même situation ?","Quelle est la différence entre 'j'ai fait une erreur' et 'je suis un raté' ?"],
    normes:["Un être humain ne peut pas être réduit à une seule action ou caractéristique.","Les erreurs font partie de l'apprentissage — elles ne définissent pas l'identité.","Se définir par ses échecs est réducteur et inexact."]
  },
  "Personnalisation":{
    questions:["Quels autres facteurs, indépendants de toi, ont contribué à cette situation ?","As-tu vraiment le contrôle total sur ce qui s'est passé ?","Est-il juste de te tenir entièrement responsable ?"],
    normes:["La plupart des situations sont influencées par de multiples facteurs.","Se sentir responsable de tout est une surcharge injuste.","La responsabilité se partage — elle n'appartient pas toujours à une seule personne."]
  }
};

const DISTORSIONS=Object.keys(DISTORSION_DATA);
const EMOTIONS=["Anxieux","Triste","En colère","Honteux","Coupable","Découragé","Frustré","Autre"];
const COMPORTEMENTS=["Évitement","Isolement","Agressivité","Procrastination","Rumination","Impulsivité","Autre"];
const STEPS=["pensee","manifestation","norme","analyse","contrearguments","ecart","besoin","evaluation"];
const STEP_LABELS={pensee:"Voix intérieure",manifestation:"Manifestation",norme:"Norme",analyse:"Analyse",contrearguments:"Contre-arguments",ecart:"Écart",besoin:"Besoins & Actions",evaluation:"Évaluation"};

function loadCarte(){
  try{const s=localStorage.getItem("tcc_carte");if(s)return JSON.parse(s);}catch{}
  return JSON.parse(JSON.stringify(CARTE_DEFAULT));
}
function saveCarte(){localStorage.setItem("tcc_carte",JSON.stringify(state.carte));}
function loadRecords(){try{return JSON.parse(localStorage.getItem("tcc_records")||"[]");}catch{return[];}}
function saveRecords(r){localStorage.setItem("tcc_records",JSON.stringify(r));}

let state={
  view:"home",step:"pensee",
  form:emptyForm(),
  records:loadRecords(),
  carte:loadCarte(),
  selected:null,
  ai:{loading:false,field:null},
  apiKey:localStorage.getItem("tcc_apikey")||""
};

function emptyForm(){
  return{pensee:"",convictionAvant:80,distorsions:[],emotions:[],comportements:[],intensiteInit:50,
    norme:"",normeAI:"",questions:[],reponses:{},contrearguments:"",contreAI:"",
    ecart:"",ecartAI:"",besoins:"",action:"",projet:"",
    convictionApres:80,intensiteApres:50,noteLibre:"",carteSelections:[]};
}

async function callAI(prompt){
  if(!state.apiKey)throw new Error("no_key");
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":state.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.content?.[0]?.text||"";
}

const CARTE_STR=()=>{
  const c=state.carte;
  return `Carte de valeur:\nValeurs: ${c.valeurs.join(", ")}\nForces: ${c.forces.join(", ")}\nRéussites: ${c.reussites.join(" | ")}\nCroyances: ${c.croyances.join(" | ")}\nEngagements: ${c.engagements.join(" | ")}\nFiertés: ${(c.fiertes||[]).join(" | ")}\nObstacles surmontés: ${(c.obstacles||[]).join(" | ")}\nCompétences: ${(c.competences||[]).join(" | ")}\nPhrases d'ancrage: ${(c.phrases||[]).join(" | ")}`;
};

async function askAI(field){
  state.ai={loading:true,field};render();
  try{
    const f=state.form;let prompt="";
    if(field==="contre"){
      const sel=f.carteSelections||[];
      prompt=`Tu es thérapeute TCC bienveillant.\n${CARTE_STR()}\n\nÉléments sélectionnés par l'utilisateur: ${sel.join(" | ")}\nVoix intérieure: "${f.pensee}"\nDistorsions: ${f.distorsions.join(", ")}\nNorme: "${f.norme}"\n\nEn t'appuyant CONCRÈTEMENT sur les éléments sélectionnés de sa carte de valeur, génère 3 contre-arguments personnalisés et puissants. Direct, ancré dans sa réalité.`;
    }else if(field==="ecart"){
      prompt=`Tu es thérapeute TCC. Voix: "${f.pensee}". Norme: "${f.norme}". Contre-arguments: "${f.contrearguments}". Formule en 2-3 phrases l'écart entre la voix et la norme. Précis et direct.`;
    }else if(field==="besoins"){
      prompt=`Tu es thérapeute TCC.\n${CARTE_STR()}\nVoix: "${f.pensee}"\nÉcart: "${f.ecart}"\nÉmotions: ${f.emotions.join(", ")}\n\nIdentifie 2-3 besoins psychologiques derrière cette voix.\nFormat strict:\nBESOINS: ...\nACTION: ...\nPROJET: ...`;
    }
    const result=await callAI(prompt);
    if(field==="contre"){state.form.contreAI=result;}
    else if(field==="ecart"){state.form.ecartAI=result;}
    else if(field==="besoins"){
      const lines=result.split("\n");
      state.form.besoins=lines.find(l=>l.startsWith("BESOINS"))?.replace("BESOINS:","").trim()||result;
      state.form.action=lines.find(l=>l.startsWith("ACTION"))?.replace(/ACTION.*:/,"").trim()||"";
      state.form.projet=lines.find(l=>l.startsWith("PROJET"))?.replace(/PROJET.*:/,"").trim()||"";
    }
  }catch(e){
    if(e.message==="no_key")alert("⚙️ Entre ta clé API dans Paramètres.");
    else alert("Erreur IA : "+e.message);
  }
  state.ai={loading:false,field:null};render();
}

function setView(v){state.view=v;render();}
function setStep(s){state.step=s;render();}
function nextStep(){const i=STEPS.indexOf(state.step);if(i<STEPS.length-1)setStep(STEPS[i+1]);}
function prevStep(){const i=STEPS.indexOf(state.step);if(i>0)setStep(STEPS[i-1]);}
function setForm(k,v){state.form[k]=v;render();}
function toggleArr(k,v){state.form[k]=state.form[k].includes(v)?state.form[k].filter(x=>x!==v):[...state.form[k],v];render();}
function toggleCarteSelection(v){
  const arr=state.form.carteSelections||[];
  state.form.carteSelections=arr.includes(v)?arr.filter(x=>x!==v):[...arr,v];
  render();
}
function finalize(){
  const record={...state.form,date:new Date().toISOString(),id:Date.now()};
  state.records=[record,...state.records];
  saveRecords(state.records);
  state.form=emptyForm();state.step="pensee";state.view="home";render();
}
function addCarteItem(key){
  const input=document.getElementById("carte_input_"+key);
  const val=input?.value?.trim();if(!val)return;
  if(!state.carte[key])state.carte[key]=[];
  state.carte[key]=[...state.carte[key],val];
  saveCarte();input.value="";render();
}
function removeCarteItem(key,idx){state.carte[key].splice(idx,1);saveCarte();render();}
function exportTxt(){
  const lines=state.records.map(r=>[
    `=== ${new Date(r.date).toLocaleDateString("fr-FR")} ===`,
    `VOIX: ${r.pensee}`,`CONVICTION: ${r.convictionAvant}% → ${r.convictionApres}%`,
    `ÉMOTIONS: ${r.emotions.join(", ")}`,`NORME: ${r.norme}`,
    `CONTRE-ARGUMENTS: ${r.contrearguments}`,`ÉCART: ${r.ecart}`,
    `BESOINS: ${r.besoins}`,`ACTION: ${r.action}`,`PROJET: ${r.projet}`,
    `NOTE: ${r.noteLibre}`,""
  ].join("\n")).join("\n");
  dl(lines,"tcc.txt","text/plain");
}
function exportJson(){dl(JSON.stringify(state.records,null,2),"tcc.json","application/json");}
function dl(content,name,type){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function progressBar(){
  const idx=STEPS.indexOf(state.step);
  const pct=Math.round(((idx+1)/STEPS.length)*100);
  return `<div class="progress-wrap">
<div class="progress-header"><span>${STEP_LABELS[state.step]}</span><span>${idx+1} / ${STEPS.length}</span></div>
<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
</div>`;
}

function tags(arr,sel,key){
  return arr.map(t=>`<button class="tag ${sel.includes(t)?"tag-on":"tag-off"}" onclick="toggleArr('${key}','${t.replace(/'/g,"\\'")}')">${t}</button>`).join("");
}

function aiBox(text,field,onUseJs){
  const loading=state.ai.loading&&state.ai.field===field;
  if(!text&&!loading)return"";
  return `<div class="ai-box"><div class="ai-label">✦ Suggestion IA</div>
${loading?`<div class="ai-text pulse">Génération en cours...</div>`:`<div class="ai-text">${esc(text)}</div>${onUseJs?`<button class="ai-use" onclick="${onUseJs}">Utiliser cette suggestion →</button>`:""}`}
</div>`;
}

function aiBtnTxt(field,label){return state.ai.loading&&state.ai.field===field?"⏳ Génération...":label;}
function navRow(canNext=true){
  const idx=STEPS.indexOf(state.step);const isLast=idx===STEPS.length-1;
  return `<div class="nav-row">
${idx>0?`<button class="btn btn-secondary" onclick="prevStep()">← Retour</button>`:""}
${!isLast
  ?`<button class="btn btn-primary" onclick="nextStep()" ${!canNext?"disabled":""}>Suivant →</button>`
  :`<button class="btn btn-success" onclick="finalize()">✅ Terminer la séance</button>`}
</div>`;
}

function renderHome(){
  const last=state.records[0];
  const btns=[
    {icon:"➕",label:"Nouvelle séance",sub:"Démarrer une restructuration",cls:"btn-primary",action:"state.form=emptyForm();state.step='pensee';setView('new')",iconBg:"rgba(255,255,255,.2)",color:"#fff"},
    {icon:"📋",label:`Historique`,sub:`${state.records.length} séance(s) enregistrée(s)`,cls:"btn-secondary",action:"setView('history')",iconBg:"var(--sky-light)",color:"var(--sky-deeper)"},
    {icon:"🗺️",label:"Carte de valeur",sub:"Enrichir ma base personnelle",cls:"btn-secondary",action:"setView('carte')",iconBg:"var(--sky-light)",color:"var(--sky-deeper)"},
    {icon:"⚙️",label:"Paramètres",sub:"Clé API et données",cls:"btn-secondary",action:"setView('settings')",iconBg:"var(--sky-light)",color:"var(--sky-deeper)"},
  ];
  return `<div class="header-badge">
<div style="font-size:2rem;margin-bottom:6px">🧠</div>
<h1 style="margin:0 0 4px">Mon TCC</h1>
<p class="sub" style="margin:0;font-size:.85rem">Restructuration cognitive personnalisée</p>
</div>
${btns.map(b=>`<button class="home-btn ${b.cls}" onclick="${b.action}" style="color:${b.color}">
<div class="home-btn-icon" style="background:${b.iconBg}">${b.icon}</div>
<div><div style="font-weight:700">${b.label}</div><div style="font-size:.8rem;opacity:.7;font-weight:400">${b.sub}</div></div>
</button>`).join("")}
${last?`<div class="section-title">Dernière séance</div>
<div class="record-card" onclick="state.selected=state.records[0];setView('detail')">
<div class="record-date">${new Date(last.date).toLocaleDateString("fr-FR",{day:"numeric",month:"long"})}</div>
<div class="record-pensee">${esc(last.pensee)}</div>
<div class="record-meta">Conviction ${last.convictionAvant}% → ${last.convictionApres}% &nbsp;·&nbsp; ${esc(last.emotions.join(", ")||"—")}</div>
</div>`:""}`;
}

function renderCarte(){
  const secs=[
    {key:"valeurs",t:"⚡ Valeurs",p:"Ex : Honnêteté, Liberté..."},
    {key:"forces",t:"💪 Forces & Qualités",p:"Ex : Patient, Créatif..."},
    {key:"reussites",t:"🏆 Réussites",p:"Ex : J'ai arrêté de fumer..."},
    {key:"croyances",t:"🧠 Croyances positives",p:"Ex : Je suis capable de m'en sortir..."},
    {key:"engagements",t:"🎯 Engagements de vie",p:"Ex : Être présent pour ma famille..."},
    {key:"fiertes",t:"🌟 Fiertés silencieuses",p:"Ex : J'ai aidé quelqu'un sans le dire..."},
    {key:"obstacles",t:"⛰️ Obstacles surmontés",p:"Ex : J'ai traversé la dépression..."},
    {key:"competences",t:"🛠️ Compétences concrètes",p:"Ex : Parler en public, Analyser..."},
    {key:"phrases",t:"💬 Phrases d'ancrage",p:"Ex : Je tiens parce que je l'ai décidé..."},
  ];
  return `<button class="back-btn" onclick="setView('home')">← Retour</button>
<h2>🗺️ Ma Carte de Valeur</h2>
<p class="sub">Enrichis ta carte — elle nourrit tes contre-arguments TCC.</p>
${secs.map(s=>{
  const items=state.carte[s.key]||[];
  return `<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
<span style="font-weight:700;color:var(--sky-deeper)">${s.t}</span>
<span class="badge badge-blue">${items.length}</span>
</div>
<div class="wrap">${items.map((x,i)=>`
<span class="tag tag-on" style="font-size:.78rem">
${esc(x)}
<button onclick="removeCarteItem('${s.key}',${i})" style="background:rgba(255,255,255,.3);border:none;color:#fff;cursor:pointer;font-size:.7rem;width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-left:2px;padding:0">✕</button>
</span>`).join("")}
${items.length===0?`<span style="color:var(--text3);font-size:.8rem;font-style:italic">Aucun élément encore</span>`:""}
</div>
<div style="display:flex;gap:8px;margin-top:12px">
<input id="carte_input_${s.key}" type="text" placeholder="${s.p}" class="text-input" style="flex:1"
  onkeydown="if(event.key==='Enter'){addCarteItem('${s.key}');}"/>
<button onclick="addCarteItem('${s.key}')" class="btn-add">+ Ajouter</button>
</div>
</div>`;
}).join("")}`;
}

function renderHistory(){
  return `<button class="back-btn" onclick="setView('home')">← Retour</button>
<h2>📋 Historique</h2>
<div style="display:flex;gap:8px;margin-bottom:16px">
<button class="btn-sm" onclick="exportTxt()">📄 Export TXT</button>
<button class="btn-sm" onclick="exportJson()">💾 Export JSON</button>
</div>
${state.records.length===0?`<div class="card" style="text-align:center;padding:40px 20px"><div style="font-size:2rem;margin-bottom:8px">📭</div><p class="sub" style="margin:0">Aucune séance encore.</p></div>`:""}
${state.records.map(r=>`<div class="record-card" onclick="state.selected=state.records.find(x=>x.id===${r.id});setView('detail')">
<div class="record-date">${new Date(r.date).toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})}</div>
<div class="record-pensee">${esc(r.pensee)}</div>
<div class="record-meta">Conviction ${r.convictionAvant}% → ${r.convictionApres}% &nbsp;·&nbsp; ${esc(r.emotions.join(", ")||"—")}</div>
</div>`).join("")}`;
}

function renderDetail(){
  const r=state.selected;if(!r)return"";
  const fields=[
    {l:"💭 Voix intérieure",v:r.pensee},{l:"🔍 Distorsions",v:r.distorsions.join(", ")||"—"},
    {l:"❤️ Émotions",v:r.emotions.join(", ")||"—"},{l:"⚖️ Norme",v:r.norme},
    {l:"🛡️ Contre-arguments",v:r.contrearguments},{l:"📐 Écart",v:r.ecart},
    {l:"🎯 Besoins",v:r.besoins},{l:"⚡ Action (5 min)",v:r.action},{l:"🗓️ Projet",v:r.projet},
    {l:"📊 Conviction",v:`${r.convictionAvant}% → ${r.convictionApres}%`},
    {l:"📝 Note",v:r.noteLibre}
  ];
  return `<button class="back-btn" onclick="setView('history')">← Retour</button>
<h2>Détail séance</h2>
<p class="sub">${new Date(r.date).toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})}</p>
${fields.filter(f=>f.v).map(f=>`<div class="card2"><div class="label">${f.l}</div><div style="color:var(--text);line-height:1.6">${esc(f.v)}</div></div>`).join("")}
<button class="btn btn-danger mt16" onclick="state.records=state.records.filter(x=>x.id!==${r.id});saveRecords(state.records);setView('history')">🗑️ Supprimer cette séance</button>`;
}

function renderSettings(){
  return `<button class="back-btn" onclick="setView('home')">← Retour</button>
<h2>⚙️ Paramètres</h2>
<div class="card">
<div style="font-weight:700;color:var(--sky-deeper);margin-bottom:6px">🔑 Clé API Anthropic</div>
<p class="sub">Nécessaire pour les suggestions IA. Gratuite sur console.anthropic.com</p>
<input class="api-input" type="password" placeholder="sk-ant-..." value="${state.apiKey}" id="apiKeyInput"/>
<button class="btn btn-primary mt8" onclick="state.apiKey=document.getElementById('apiKeyInput').value;localStorage.setItem('tcc_apikey',state.apiKey);alert('✅ Clé sauvegardée !')">Sauvegarder la clé</button>
</div>
<div class="card mt12">
<div style="font-weight:700;color:var(--sky-deeper);margin-bottom:6px">💾 Données</div>
<p class="sub">${state.records.length} séance(s) · ${Object.values(state.carte).flat().length} éléments dans la carte</p>
<div style="display:flex;gap:8px;margin-top:8px">
<button class="btn-sm" onclick="exportTxt()">📄 Export TXT</button>
<button class="btn-sm" onclick="exportJson()">💾 Export JSON</button>
</div>
</div>
<div class="card mt12">
<div style="font-weight:700;color:var(--sky-deeper);margin-bottom:6px">📱 Installer l'app</div>
<p class="sub">iPhone : Safari → Partager → Sur l'écran d'accueil</p>
<p class="sub" style="margin-bottom:0">Android : Chrome → Menu → Ajouter à l'écran d'accueil</p>
</div>`;
}

function renderNew(){
  const f=state.form;
  const load=field=>state.ai.loading&&state.ai.field===field;
  let content="";

  if(state.step==="pensee"){
    content=`<h2>💭 Quelle est la voix intérieure ?</h2>
<p class="sub">Ce que la voix dit, mot pour mot.</p>
<textarea id="penseeInput" rows="5" placeholder="Ex : Je suis incompétent, je n'y arriverai jamais..."
  onblur="setForm('pensee',this.value)">${esc(f.pensee)}</textarea>
<div class="mt16">
<p class="sub">Niveau de conviction : <span class="strong">${f.convictionAvant}%</span></p>
<input type="range" min="0" max="100" value="${f.convictionAvant}" oninput="setForm('convictionAvant',+this.value)"/>
</div>
${navRow(true)}`;

  }else if(state.step==="manifestation"){
    content=`<h2>🔍 Comment ça se manifeste ?</h2>
<p class="sub">Distorsions cognitives</p>
<div class="wrap">${tags(DISTORSIONS,f.distorsions,"distorsions")}</div>
<p class="sub">Émotions</p>
<div class="wrap">${tags(EMOTIONS,f.emotions,"emotions")}</div>
<p class="sub">Comportements</p>
<div class="wrap">${tags(COMPORTEMENTS,f.comportements,"comportements")}</div>
<div class="divider"></div>
<p class="sub">Intensité émotionnelle : <span class="strong">${f.intensiteInit}/100</span></p>
<input type="range" min="0" max="100" value="${f.intensiteInit}" oninput="setForm('intensiteInit',+this.value)"/>
${navRow()}`;

  }else if(state.step==="norme"){
    const normesAuto=[...new Set(f.distorsions.flatMap(d=>(DISTORSION_DATA[d]?.normes||[])))];
    content=`<h2>⚖️ Quelle est la norme ?</h2>
<p class="sub">Le fait objectif et universel qui permet d'analyser cette voix.</p>
${normesAuto.length>0?`
<p class="label" style="color:var(--sky-deeper)">📌 Normes selon tes distorsions — appuie pour sélectionner</p>
${normesAuto.map(n=>`<div class="norme-card" onclick="setForm('norme','${n.replace(/'/g,"\\'").replace(/"/g,"&quot;")}')">
<div style="font-size:.875rem;color:var(--text);line-height:1.5">${esc(n)}</div>
<div class="norme-hint">Appuyer pour utiliser →</div>
</div>`).join("")}
<div class="divider"></div>
<p class="label">✏️ Ou formule la tienne</p>
`:`<p class="sub" style="color:var(--text3);font-style:italic">Sélectionne des distorsions à l'étape précédente pour voir des normes suggérées.</p>`}
<textarea rows="4" placeholder="Ex : La perfection n'existe pas..."
  onblur="setForm('norme',this.value)">${esc(f.norme)}</textarea>
${navRow()}`;

  }else if(state.step==="analyse"){
    const questionsAuto=[...new Set(f.distorsions.flatMap(d=>(DISTORSION_DATA[d]?.questions||[])))];
    content=`<h2>🗣️ Analyse</h2>
<p class="sub">Questions pour challenger la voix.</p>
${questionsAuto.length>0?`
<p class="label" style="color:var(--sky-deeper)">📌 Questions selon tes distorsions</p>
${questionsAuto.map((q,i)=>`<div class="card2">
<div style="font-size:.875rem;font-weight:600;color:var(--sky-deeper);margin-bottom:8px">${esc(q)}</div>
<textarea rows="3" placeholder="Ta réponse..."
  onblur="state.form.reponses['auto_${i}']=this.value"
>${esc(f.reponses[`auto_${i}`]||"")}</textarea>
</div>`).join("")}`:`<p class="sub" style="color:var(--text3);font-style:italic">Sélectionne des distorsions pour voir des questions personnalisées.</p>`}
<div class="divider"></div>
<p class="label">✏️ Mes questions personnelles</p>
${(f.questions||[]).map((q,i)=>`<div class="card2" style="position:relative">
<div style="font-size:.875rem;font-weight:600;color:var(--text);margin-bottom:8px">${esc(q)}</div>
<textarea rows="3" placeholder="Ta réponse..."
  onblur="state.form.reponses['custom_${i}']=this.value"
>${esc(f.reponses[`custom_${i}`]||"")}</textarea>
<button onclick="state.form.questions.splice(${i},1);render()" style="position:absolute;top:12px;right:12px;background:var(--border);border:none;color:var(--text2);cursor:pointer;font-size:.75rem;border-radius:99px;width:22px;height:22px;display:flex;align-items:center;justify-content:center">✕</button>
</div>`).join("")}
<div class="card" style="border-style:dashed;background:transparent">
<p class="label">+ Ajouter ma propre question</p>
<textarea rows="2" placeholder="Ex : Est-ce que j'ai déjà vécu ça et m'en suis sorti ?" id="newQ"></textarea>
<button class="btn btn-secondary mt8" style="padding:10px" onclick="const q=document.getElementById('newQ').value.trim();if(q){state.form.questions=[...(state.form.questions||[]),q];render();}">Ajouter la question</button>
</div>
${navRow()}`;

  }else if(state.step==="contrearguments"){
    const allItems=[
      ...state.carte.valeurs.map(x=>({label:x,cat:"⚡"})),
      ...state.carte.forces.map(x=>({label:x,cat:"💪"})),
      ...state.carte.reussites.map(x=>({label:x,cat:"🏆"})),
      ...state.carte.croyances.map(x=>({label:x,cat:"🧠"})),
      ...(state.carte.fiertes||[]).map(x=>({label:x,cat:"🌟"})),
      ...(state.carte.obstacles||[]).map(x=>({label:x,cat:"⛰️"})),
      ...(state.carte.phrases||[]).map(x=>({label:x,cat:"💬"})),
    ];
    const sel=f.carteSelections||[];
    content=`<h2>🛡️ Contre-arguments</h2>
<p class="sub">Coche les éléments de ta carte qui contredisent cette voix.</p>
<div class="wrap mb12">
${allItems.map(item=>`<button class="tag ${sel.includes(item.label)?"tag-on":"tag-off"}" onclick="toggleCarteSelection('${item.label.replace(/'/g,"\\'").replace(/"/g,"&quot;")}')">
${item.cat} ${esc(item.label)}
</button>`).join("")}
</div>
${sel.length>0?`<div class="card2" style="border-color:var(--sky)">
<p class="label" style="color:var(--sky-deeper)">✅ ${sel.length} élément(s) sélectionné(s)</p>
<div class="wrap">${sel.map(s=>`<span class="badge badge-blue">${esc(s)}</span>`).join("")}</div>
</div>`:""}
<div class="divider"></div>
${sel.length>0?`<button class="btn btn-primary mb12" onclick="askAI('contre')" ${load("contre")?"disabled":""}>${aiBtnTxt("contre","✦ Générer depuis ma carte de valeur")}</button>`:""}
${aiBox(f.contreAI,"contre","setForm('contrearguments',state.form.contreAI)")}
<span class="label">✏️ Formule ou ajuste tes contre-arguments</span>
<textarea rows="5" placeholder="Tes contre-arguments..."
  onblur="setForm('contrearguments',this.value)">${esc(f.contrearguments)}</textarea>
${navRow()}`;

  }else if(state.step==="ecart"){
    content=`<h2>📐 Écart constaté</h2>
<p class="sub">Ce qui sépare la voix de la norme.</p>
<button class="btn btn-primary mb12" onclick="askAI('ecart')" ${load("ecart")?"disabled":""}>${aiBtnTxt("ecart","✦ Analyser l'écart")}</button>
${aiBox(f.ecartAI,"ecart","setForm('ecart',state.form.ecartAI)")}
<textarea rows="4" placeholder="L'écart entre la voix et la norme..."
  onblur="setForm('ecart',this.value)">${esc(f.ecart)}</textarea>
${navRow()}`;

  }else if(state.step==="besoin"){
    content=`<h2>🎯 Besoins & Actions</h2>
<p class="sub">Quel besoin se cache derrière ? Que faire ?</p>
<button class="btn btn-primary mb12" onclick="askAI('besoins')" ${load("besoins")?"disabled":""}>${aiBtnTxt("besoins","✦ Identifier besoins & actions")}</button>
${load("besoins")?`<p class="sub pulse" style="text-align:center">Génération en cours...</p>`:""}
<span class="label">Besoins identifiés</span>
<textarea rows="3" placeholder="Ex : Confiance en soi, clarté..." onblur="setForm('besoins',this.value)" class="mb12">${esc(f.besoins)}</textarea>
<span class="label">⚡ Action immédiate (5 min)</span>
<textarea rows="3" placeholder="Ex : Respirer 5 min, écrire 3 réussites..." onblur="setForm('action',this.value)" class="mb12">${esc(f.action)}</textarea>
<span class="label">🗓️ Projet (long terme)</span>
<textarea rows="3" placeholder="Ex : Méditer chaque jour..." onblur="setForm('projet',this.value)">${esc(f.projet)}</textarea>
${navRow()}`;

  }else if(state.step==="evaluation"){
    const cd=f.convictionAvant-f.convictionApres;
    const id=f.intensiteInit-f.intensiteApres;
    content=`<h2>📊 Évaluation</h2>
<div class="card2 italic mb12">"${esc(f.pensee)}"</div>
<p class="sub">Conviction maintenant : <span class="strong">${f.convictionApres}%</span></p>
<input type="range" min="0" max="100" value="${f.convictionApres}" oninput="setForm('convictionApres',+this.value)"/>
<p class="sub mt12">Intensité émotionnelle maintenant : <span class="strong">${f.intensiteApres}/100</span></p>
<input type="range" min="0" max="100" value="${f.intensiteApres}" oninput="setForm('intensiteApres',+this.value)"/>
<div class="stat-grid mt16">
<div class="stat-card"><div class="label">Conviction</div>
<div class="stat-val ${cd>0?"green":"orange"}">${cd>0?"−":"+"} ${Math.abs(cd)}%</div></div>
<div class="stat-card"><div class="label">Intensité</div>
<div class="stat-val ${id>0?"green":"orange"}">${id>0?"−":"+"} ${Math.abs(id)}</div></div>
</div>
<span class="label">Note libre</span>
<textarea rows="4" placeholder="Comment tu te sens après cette séance ?" onblur="setForm('noteLibre',this.value)">${esc(f.noteLibre)}</textarea>
${navRow()}`;
  }

  return `<button class="back-btn" onclick="setView('home')">← Annuler</button>
${progressBar()}${content}`;
}

function render(){
  const app=document.getElementById("app");
  let html="";
  if(state.view==="home")html=renderHome();
  else if(state.view==="new")html=renderNew();
  else if(state.view==="history")html=renderHistory();
  else if(state.view==="detail")html=renderDetail();
  else if(state.view==="carte")html=renderCarte();
  else if(state.view==="settings")html=renderSettings();
  app.innerHTML=html;
}

render();
</script>
</body>
</html>
