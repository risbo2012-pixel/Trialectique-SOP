<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0a0a0a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Mon TCC"/>
<title>Mon TCC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:16px;min-height:100vh}
h1{font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:4px}
h2{font-size:1.2rem;font-weight:700;margin-bottom:8px}
p.sub{color:#9ca3af;font-size:.875rem;margin-bottom:12px}
textarea{width:100%;background:#1f2937;border:none;border-radius:16px;padding:16px;color:#fff;font-size:1rem;resize:none;outline:none;font-family:inherit;line-height:1.5}
textarea:focus{box-shadow:0 0 0 2px #7c3aed}
input[type=range]{width:100%;accent-color:#7c3aed;margin:8px 0}
.btn{width:100%;padding:16px;border:none;border-radius:16px;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;display:block;text-align:left}
.btn-primary{background:linear-gradient(to right,#7c3aed,#db2777);color:#fff;text-align:center}
.btn-secondary{background:#1f2937;color:#fff}
.btn-success{background:linear-gradient(to right,#16a34a,#0d9488);color:#fff;text-align:center}
.btn-danger{background:#7f1d1d;color:#fca5a5;font-size:.875rem;text-align:center}
.btn:disabled{opacity:.4;cursor:default}
.btn-sm{padding:8px 16px;font-size:.8rem;border-radius:12px;border:none;cursor:pointer;font-weight:600;background:#1f2937;color:#fff}
.card{background:#1f2937;border-radius:16px;padding:16px;margin-bottom:12px}
.card-label{font-size:.75rem;color:#9ca3af;margin-bottom:4px}
.tag{display:inline-block;padding:6px 12px;border-radius:20px;font-size:.8rem;cursor:pointer;margin:4px;border:none;font-weight:600;transition:.2s}
.tag-off{background:#1f2937;color:#d1d5db}
.tag-on{background:#7c3aed;color:#fff}
.progress-bar{background:#374151;border-radius:99px;height:8px;margin-bottom:16px}
.progress-fill{height:8px;border-radius:99px;background:linear-gradient(to right,#7c3aed,#db2777);transition:width .4s}
.progress-header{display:flex;justify-content:space-between;font-size:.75rem;color:#9ca3af;margin-bottom:4px}
.ai-box{background:#1e1b4b;border:1px solid #4c1d95;border-radius:12px;padding:12px;margin-bottom:12px;font-size:.875rem}
.ai-label{font-size:.7rem;color:#a78bfa;margin-bottom:4px}
.ai-text{color:#e9d5ff;white-space:pre-wrap;line-height:1.5}
.ai-use{background:none;border:none;color:#a78bfa;font-size:.75rem;text-decoration:underline;cursor:pointer;margin-top:6px}
.nav-row{display:flex;gap:12px;margin-top:16px}
.nav-row .btn{flex:1;text-align:center}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{background:#1f2937;border-radius:16px;padding:12px;text-align:center}
.stat-val{font-size:1.5rem;font-weight:700}
.green{color:#4ade80}.orange{color:#fb923c}
.record-card{background:#1f2937;border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer}
.record-card:hover{background:#374151}
.record-date{font-size:.75rem;color:#6b7280;margin-bottom:4px}
.record-pensee{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-meta{font-size:.8rem;color:#9ca3af;margin-top:4px}
.section-title{font-size:.9rem;font-weight:700;margin:16px 0 8px}
.api-input{background:#1f2937;border:1px solid #374151;border-radius:12px;padding:12px;color:#fff;width:100%;font-size:.85rem;outline:none;margin-bottom:8px;font-family:inherit}
.api-input:focus{border-color:#7c3aed}
.back-btn{background:none;border:none;color:#9ca3af;font-size:.875rem;cursor:pointer;margin-bottom:16px;display:block;padding:0}
.italic{font-style:italic;color:#d1d5db}
.wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.mb8{margin-bottom:8px}
.mb12{margin-bottom:12px}
.mb16{margin-bottom:16px}
.mt8{margin-top:8px}
.mt12{margin-top:12px}
.mt16{margin-top:16px}
.label{font-size:.8rem;color:#9ca3af;margin-bottom:4px;display:block}
.strong{color:#fff;font-weight:700}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// =====================================================
// DONNÉES PERSONNELLES
// =====================================================
const CARTE = {
  valeurs:["Travail","Respect","Famille","Discipline","Amour","Effort","Détermination"],
  forces:["Persévérant","Discipliné","Physique travaillé par le sport","Curieux","Intelligent","Déterminé","Ambitieux","Empathique"],
  reussites:["70 jours sans alcool depuis février","Sportif — 5 séances/semaine","54 livres lus l'année passée","Lecteur quotidien à haute voix","Fonctionnaire des Nations Unies","A combattu et combat la dépression","Construit sa propre maison","Créé son propre outil TCC","Appris à parler en public","Se construit chaque jour par la discipline"],
  croyances:["Je suis capable — je le prouve chaque jour","J'ai du respect pour moi-même","Je suis fier de moi","Je fais ce que je dis","Je peux tenir un engagement","Je peux m'en sortir","L'opinion des autres ne m'arrête pas","Les pressions internes ne m'arrêtent pas"],
  engagements:["Me construire émotionnellement, physiquement, intellectuellement","Fonder une famille","Être en santé mentale et physique","Construire ma carrière","Investir dans mes passions"]
};
const CARTE_STR = `Carte de valeur:\nValeurs: ${CARTE.valeurs.join(", ")}\nForces: ${CARTE.forces.join(", ")}\nRéussites: ${CARTE.reussites.join(" | ")}\nCroyances: ${CARTE.croyances.join(" | ")}\nEngagements: ${CARTE.engagements.join(" | ")}`;

const DISTORSION_DATA = {
  "Tout ou rien": {
    questions: [
      "Y a-t-il des nuances ou des situations intermédiaires que tu ignores ?",
      "Sur une échelle de 0 à 100, où se situe vraiment cette situation ?",
      "Est-ce vraiment tout noir ou tout blanc, ou y a-t-il du gris ?"
    ],
    normes: [
      "La réalité existe rarement en termes absolus — elle est faite de nuances.",
      "Penser en tout ou rien amplifie la souffrance sans refléter la réalité.",
      "L'échec partiel n'est pas un échec total."
    ]
  },
  "Surgénéralisation": {
    questions: [
      "Est-ce que cette situation s'est vraiment passée à chaque fois, ou seulement parfois ?",
      "Quelles sont les exceptions à cette règle que tu t'imposes ?",
      "Un seul événement peut-il vraiment définir une règle universelle ?"
    ],
    normes: [
      "Un événement isolé ne constitue pas une règle universelle.",
      "Tirer une conclusion générale d'un seul fait est une erreur logique.",
      "Les exceptions existent toujours — les ignorer fausse le jugement."
    ]
  },
  "Filtre négatif": {
    questions: [
      "Qu'est-ce qui s'est bien passé dans cette situation que tu ne mentionnes pas ?",
      "Si tu devais noter objectivement cette situation, quel score lui donnerais-tu ?",
      "Pourquoi ton attention se fixe-t-elle uniquement sur le négatif ?"
    ],
    normes: [
      "Une situation contient toujours des éléments positifs et négatifs.",
      "Se focaliser uniquement sur le négatif déforme la réalité.",
      "Un jugement équilibré prend en compte l'ensemble des faits."
    ]
  },
  "Dévalorisation du positif": {
    questions: [
      "Pourquoi minimises-tu ce qui s'est bien passé ?",
      "Si quelqu'un d'autre avait réussi ça, dirais-tu que c'est sans importance ?",
      "Quelle preuve as-tu que ce positif ne compte pas ?"
    ],
    normes: [
      "Les réussites méritent d'être reconnues au même titre que les échecs.",
      "Minimiser le positif est une distorsion, pas une lucidité.",
      "Ce qui est bien accompli a une valeur réelle, indépendamment du contexte."
    ]
  },
  "Lecture des pensées": {
    questions: [
      "As-tu demandé directement à cette personne ce qu'elle pense vraiment ?",
      "Quelle preuve concrète as-tu de ce que tu supposes ?",
      "Est-il possible que tu projettes tes propres craintes sur cette personne ?"
    ],
    normes: [
      "Personne ne peut lire dans les pensées des autres.",
      "Une supposition n'est pas un fait — seule la vérification compte.",
      "Les interprétations sans preuve sont des constructions mentales."
    ]
  },
  "Prédiction négative": {
    questions: [
      "Quelle est la probabilité réelle que le pire se produise ?",
      "Combien de fois as-tu prédit le pire et ça ne s'est pas passé ainsi ?",
      "Quels scénarios positifs ou neutres sont possibles ?"
    ],
    normes: [
      "Le futur est incertain — les prédictions négatives ne sont pas des faits.",
      "Anticiper le pire sans preuve est une erreur de raisonnement.",
      "Les issues positives sont aussi probables que les négatives."
    ]
  },
  "Catastrophisme": {
    questions: [
      "Quelle est la pire chose réaliste qui puisse arriver, et peux-tu y faire face ?",
      "Dans 5 ans, est-ce que cet événement aura encore autant d'importance ?",
      "As-tu déjà traversé des situations difficiles et t'en es sorti ?"
    ],
    normes: [
      "Exagérer la gravité d'une situation augmente la souffrance sans changer les faits.",
      "La plupart des situations difficiles sont surmontables.",
      "La capacité humaine à s'adapter est généralement sous-estimée."
    ]
  },
  "Raisonnement émotionnel": {
    questions: [
      "Ce que tu ressens est-il une preuve de ce qui est vrai ?",
      "Peux-tu trouver des faits objectifs qui contredisent ce que tu ressens ?",
      "Tes émotions t'informent-elles ou te trompent-elles ici ?"
    ],
    normes: [
      "Une émotion est une information, pas une vérité absolue.",
      "Ressentir quelque chose ne le rend pas réel ou vrai.",
      "Les faits existent indépendamment de ce qu'on ressent."
    ]
  },
  "Les « je dois »": {
    questions: [
      "Qui a décidé de cette règle que tu t'imposes ?",
      "Que se passe-t-il réellement si tu ne respectes pas ce 'je dois' ?",
      "Cette règle est-elle flexible ou rigide — et pourquoi ?"
    ],
    normes: [
      "Les règles rigides créent de la souffrance inutile.",
      "Les attentes perfectionnistes sont rarement réalistes ou utiles.",
      "La flexibilité est une force, pas une faiblesse."
    ]
  },
  "Étiquetage": {
    questions: [
      "Est-ce qu'une action ou une erreur définit totalement qui tu es ?",
      "Utiliserais-tu cette étiquette pour définir quelqu'un d'autre dans la même situation ?",
      "Quelle est la différence entre 'j'ai fait une erreur' et 'je suis un raté' ?"
    ],
    normes: [
      "Un être humain ne peut pas être réduit à une seule action ou caractéristique.",
      "Les erreurs font partie de l'apprentissage — elles ne définissent pas l'identité.",
      "Se définir par ses échecs est réducteur et inexact."
    ]
  },
  "Personnalisation": {
    questions: [
      "Quels autres facteurs, indépendants de toi, ont contribué à cette situation ?",
      "As-tu vraiment le contrôle total sur ce qui s'est passé ?",
      "Est-il juste de te tenir entièrement responsable de quelque chose qui implique d'autres personnes ?"
    ],
    normes: [
      "La plupart des situations sont influencées par de multiples facteurs.",
      "Se sentir responsable de tout est une surcharge injuste.",
      "La responsabilité se partage — elle n'appartient pas toujours à une seule personne."
    ]
  }
};

const DISTORSIONS=["Tout ou rien","Surgénéralisation","Filtre négatif","Dévalorisation du positif","Lecture des pensées","Prédiction négative","Catastrophisme","Raisonnement émotionnel","Les « je dois »","Étiquetage","Personnalisation"];
const EMOTIONS=["Anxieux","Triste","En colère","Honteux","Coupable","Découragé","Frustré","Autre"];
const COMPORTEMENTS=["Évitement","Isolement","Agressivité","Procrastination","Rumination","Impulsivité","Autre"];
const STEPS=["pensee","manifestation","norme","analyse","contrearguments","ecart","besoin","evaluation"];
const STEP_LABELS={pensee:"Voix intérieure",manifestation:"Manifestation",norme:"Norme",analyse:"Analyse",contrearguments:"Contre-arguments",ecart:"Écart",besoin:"Besoins & Actions",evaluation:"Évaluation"};

// =====================================================
// STATE
// =====================================================
let state = {
  view:"home",
  step:"pensee",
  form:emptyForm(),
  records:loadRecords(),
  carte:null,
  selected:null,
  ai:{loading:false,field:null},
  apiKey:localStorage.getItem("tcc_apikey")||""
};
state.carte=loadCarte();

function emptyForm(){
  return {
    pensee:"",convictionAvant:80,
    distorsions:[],emotions:[],comportements:[],intensiteInit:50,
    norme:"",normeAI:"",
    questions:[],reponses:{},
    contrearguments:"",contreAI:"",
    ecart:"",ecartAI:"",
    besoins:"",action:"",projet:"",
    convictionApres:80,intensiteApres:50,noteLibre:""
  };
}

function loadRecords(){
  try{return JSON.parse(localStorage.getItem("tcc_records")||"[]");}catch{return[];}
}

function saveRecords(r){
  localStorage.setItem("tcc_records",JSON.stringify(r));
}

// =====================================================
// AI
// =====================================================
async function callAI(prompt){
  if(!state.apiKey) throw new Error("no_key");
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":state.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text||"";
}

async function askAI(field){
  state.ai={loading:true,field};
  render();
  try{
    const f=state.form;
    let prompt="";
    if(field==="norme"){
      prompt=`Tu es thérapeute TCC. Voix intérieure: "${f.pensee}". Propose 2-3 normes objectives (faits universels vérifiables) pour analyser cette pensée. Ex: "La perfection n'existe pas". Direct, sans intro.`;
    }else if(field==="questions"){
      prompt=`Tu es thérapeute TCC. Voix intérieure: "${f.pensee}". Génère 5 questions socratiques précises pour challenger cette pensée. Une par ligne, sans numérotation ni intro.`;
    }else if(field==="contre"){
      prompt=`Tu es thérapeute TCC bienveillant.\n${CARTE_STR}\n\nVoix intérieure: "${f.pensee}"\nDistorsions: ${f.distorsions.join(", ")}\nNorme: "${f.norme}"\nRéponses: ${Object.entries(f.reponses).map(([q,r])=>`Q:${q}/R:${r}`).join(" | ")}\n\nEn t'appuyant CONCRÈTEMENT sur la carte de valeur, génère 3 contre-arguments personnalisés et puissants. Direct, ancré dans sa réalité.`;
    }else if(field==="ecart"){
      prompt=`Tu es thérapeute TCC. Voix: "${f.pensee}". Norme: "${f.norme}". Contre-arguments: "${f.contrearguments}". Formule en 2-3 phrases l'écart entre la voix et la norme. Précis et direct.`;
    }else if(field==="besoins"){
      prompt=`Tu es thérapeute TCC.\n${CARTE_STR}\nVoix: "${f.pensee}"\nÉcart: "${f.ecart}"\nÉmotions: ${f.emotions.join(", ")}\n\nIdentifie 2-3 besoins psychologiques derrière cette voix.\nFormat strict:\nBESOINS: ...\nACTION: ...\nPROJET: ...`;
    }
    const result = await callAI(prompt);
    if(field==="questions"){
      state.form.questions=result.split("\n").map(q=>q.trim()).filter(q=>q.length>5);
    }else if(field==="norme"){state.form.normeAI=result;}
    else if(field==="contre"){state.form.contreAI=result;}
    else if(field==="ecart"){state.form.ecartAI=result;}
    else if(field==="besoins"){
      const lines=result.split("\n");
      state.form.besoins=lines.find(l=>l.startsWith("BESOINS"))?.replace("BESOINS:","").trim()||result;
      state.form.action=lines.find(l=>l.startsWith("ACTION"))?.replace(/ACTION.*:/,"").trim()||"";
      state.form.projet=lines.find(l=>l.startsWith("PROJET"))?.replace(/PROJET.*:/,"").trim()||"";
    }
  }catch(e){
    if(e.message==="no_key") alert("⚙️ Entre ta clé API dans Paramètres.");
    else alert("Erreur IA : "+e.message);
  }
  state.ai={loading:false,field:null};
  render();
}

// =====================================================
// HELPERS
// =====================================================
function setView(v){state.view=v;render();}
function setStep(s){state.step=s;render();}
function nextStep(){const i=STEPS.indexOf(state.step);if(i<STEPS.length-1)setStep(STEPS[i+1]);}
function prevStep(){const i=STEPS.indexOf(state.step);if(i>0)setStep(STEPS[i-1]);}
function setForm(k,v){state.form[k]=v;render();}
function toggleArr(k,v){
  state.form[k]=state.form[k].includes(v)?state.form[k].filter(x=>x!==v):[...state.form[k],v];
  render();
}
function finalize(){
  const record={...state.form,date:new Date().toISOString(),id:Date.now()};
  state.records=[record,...state.records];
  saveRecords(state.records);
  state.form=emptyForm();
  state.step="pensee";
  state.view="home";
  render();
}
function exportTxt(){
  const lines=state.records.map(r=>[
    `=== ${new Date(r.date).toLocaleDateString("fr-FR")} ===`,
    `VOIX: ${r.pensee}`,`CONVICTION: ${r.convictionAvant}% → ${r.convictionApres}%`,
    `ÉMOTIONS: ${r.emotions.join(", ")}`,`NORME: ${r.norme}`,
    `CONTRE-ARGUMENTS: ${r.contrearguments}`,`ÉCART: ${r.ecart}`,
    `BESOINS: ${r.besoins}`,`ACTION: ${r.action}`,`PROJET: ${r.projet}`,
    `NOTE: ${r.noteLibre}`,""
  ].join("\n")).join("\n");
  dl(lines,"tcc.txt","text/plain");
}
function exportJson(){
  dl(JSON.stringify(state.records,null,2),"tcc.json","application/json");
}
function dl(content,name,type){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name;a.click();
}

// =====================================================
// RENDER HELPERS
// =====================================================
function progressBar(){
  const idx=STEPS.indexOf(state.step);
  const pct=Math.round(((idx+1)/STEPS.length)*100);
  return `<div class="progress-header"><span>${STEP_LABELS[state.step]}</span><span>${idx+1}/${STEPS.length}</span></div>
<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
}
function tags(arr,sel,key){
  return arr.map(t=>`<button class="tag ${sel.includes(t)?"tag-on":"tag-off"}" onclick="toggleArr('${key}','${t.replace(/'/g,"\\'")}')">${t}</button>`).join("");
}
function aiBox(text,field,onUseJs){
  const loading=state.ai.loading&&state.ai.field===field;
  if(!text&&!loading)return"";
  return `<div class="ai-box"><div class="ai-label">🤖 Suggestion IA</div>
${loading?`<div class="ai-text pulse">Génération en cours...</div>`:`<div class="ai-text">${esc(text)}</div>${onUseJs?`<button class="ai-use" onclick="${onUseJs}">Utiliser</button>`:""}`}
</div>`;
}
function aiBtnTxt(field,label){
  return state.ai.loading&&state.ai.field===field?"⏳ Génération...":label;
}
function navRow(canNext=true){
  const idx=STEPS.indexOf(state.step);
  const isLast=idx===STEPS.length-1;
  return `<div class="nav-row">
${idx>0?`<button class="btn btn-secondary" onclick="prevStep()">← Retour</button>`:""}
${!isLast
  ?`<button class="btn btn-primary" onclick="nextStep()" ${!canNext?"disabled":""}>Suivant →</button>`
  :`<button class="btn btn-success" onclick="finalize()">✅ Terminer la séance</button>`}
</div>`;
}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// =====================================================
// VIEWS
// =====================================================
function renderHome(){
  const last=state.records[0];
  return `<h1>🧠 Mon TCC</h1>
<p class="sub" style="text-align:center;margin-bottom:24px">Restructuration cognitive personnalisée</p>
<button class="btn btn-primary mb12" onclick="state.form=emptyForm();state.step='pensee';setView('new')">+ Nouvelle séance</button>
<button class="btn btn-secondary mb12" onclick="setView('history')">📋 Historique (${state.records.length})</button>
<button class="btn btn-secondary mb12" onclick="setView('carte')">🗺️ Ma carte de valeur</button>
<button class="btn btn-secondary" onclick="setView('settings')">⚙️ Paramètres</button>
${last?`<div class="section-title">Dernière séance</div>
<div class="record-card" onclick="state.selected=state.records[0];setView('detail')">
<div class="record-date">${new Date(last.date).toLocaleDateString("fr-FR",{day:"numeric",month:"long"})}</div>
<div class="record-pensee">${esc(last.pensee)}</div>
<div class="record-meta">Conviction ${last.convictionAvant}% → ${last.convictionApres}%</div>
</div>`:""}`;
}

// Carte dynamique — chargée depuis localStorage ou base par défaut
function loadCarte(){
  try{
    const saved=localStorage.getItem("tcc_carte");
    if(saved) return JSON.parse(saved);
  }catch{}
  return {
    valeurs:[...CARTE.valeurs],
    forces:[...CARTE.forces],
    reussites:[...CARTE.reussites],
    croyances:[...CARTE.croyances],
    engagements:[...CARTE.engagements],
    fiertes:[],
    obstacles:[],
    competences:[],
    phrases:[]
  };
}
function saveCarte(){
  localStorage.setItem("tcc_carte",JSON.stringify(state.carte));
}
function addCarteItem(key){
  const input=document.getElementById("carte_input_"+key);
  const val=input?.value?.trim();
  if(!val)return;
  if(!state.carte[key])state.carte[key]=[];
  state.carte[key]=[...state.carte[key],val];
  saveCarte();
  input.value="";
  render();
}
function removeCarteItem(key,idx){
  state.carte[key].splice(idx,1);
  saveCarte();
  render();
}

function renderCarte(){
  const secs=[
    {key:"valeurs",t:"⚡ Valeurs",placeholder:"Ex : Honnêteté, Liberté..."},
    {key:"forces",t:"💪 Forces & Qualités",placeholder:"Ex : Patient, Créatif..."},
    {key:"reussites",t:"🏆 Réussites",placeholder:"Ex : J'ai arrêté de fumer..."},
    {key:"croyances",t:"🧠 Croyances positives",placeholder:"Ex : Je suis capable de m'en sortir..."},
    {key:"engagements",t:"🎯 Engagements de vie",placeholder:"Ex : Être présent pour ma famille..."},
    {key:"fiertes",t:"🌟 Fiertés silencieuses",placeholder:"Ex : J'ai aidé quelqu'un sans le dire..."},
    {key:"obstacles",t:"⛰️ Obstacles surmontés",placeholder:"Ex : J'ai traversé la dépression..."},
    {key:"competences",t:"🛠️ Compétences concrètes",placeholder:"Ex : Parler en public, Analyser..."},
    {key:"phrases",t:"💬 Mes phrases d'ancrage",placeholder:"Ex : Je tiens parce que je l'ai décidé..."},
  ];
  return `<button class="back-btn" onclick="setView('home')">← Retour</button>
<h2>🗺️ Ma Carte de Valeur</h2>
<p class="sub">Enrichis ta carte — elle nourrit tes contre-arguments TCC.</p>
${secs.map(s=>{
  const items=state.carte[s.key]||[];
  return `<div class="card">
<div style="font-weight:700;margin-bottom:8px">${s.t} <span style="color:#6b7280;font-size:.75rem">(${items.length})</span></div>
<div class="wrap">${items.map((x,i)=>`
<span class="tag tag-off" style="cursor:default;display:inline-flex;align-items:center;gap:4px">
${esc(x)}
<button onclick="removeCarteItem('${s.key}',${i})" style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:.7rem;padding:0;line-height:1">✕</button>
</span>`).join("")}
${items.length===0?`<span style="color:#4b5563;font-size:.8rem;font-style:italic">Aucun élément encore</span>`:""}
</div>
<div style="display:flex;gap:8px;margin-top:10px">
<input id="carte_input_${s.key}" type="text" placeholder="${s.placeholder}"
  class="api-input" style="flex:1;margin:0"
  onkeydown="if(event.key==='Enter'){addCarteItem('${s.key}');}"/>
<button onclick="addCarteItem('${s.key}')"
  style="background:#7c3aed;color:#fff;border:none;border-radius:12px;padding:8px 14px;cursor:pointer;font-weight:700;white-space:nowrap">+ Ajouter</button>
</div>
</div>`;
}).join("")}`;
}

function renderHistory(){
  return `<button class="back-btn" onclick="setView('home')">← Retour</button>
<h2>📋 Historique</h2>
<div style="display:flex;gap:8px;margin-bottom:16px">
<button class="btn-sm" onclick="exportTxt()">📄 Export TXT</button>
<button class="btn-sm" onclick="exportJson()">💾 Export JSON</button>
</div>
${state.records.length===0?`<p class="sub" style="text-align:center;margin-top:40px">Aucune séance encore.</p>`:""}
${state.records.map(r=>`<div class="record-card" onclick="state.selected=state.records.find(x=>x.id===${r.id});setView('detail')">
<div class="record-date">${new Date(r.date).toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})}</div>
<div class="record-pensee">${esc(r.pensee)}</div>
<div class="record-meta">${esc(r.emotions.join(", ")||"—")} · Conviction ${r.convictionAvant}% → ${r.convictionApres}%</div>
</div>`).join("")}`;
}

function renderDetail(){
  const r=state.selected;if(!r)return"";
  const fields=[
    {l:"Voix intérieure",v:r.pensee},{l:"Distorsions",v:r.distorsions.join(", ")||"—"},
    {l:"Émotions",v:r.emotions.join(", ")||"—"},{l:"Norme",v:r.norme},
    {l:"Contre-arguments",v:r.contrearguments},{l:"Écart",v:r.ecart},
    {l:"Besoins",v:r.besoins},{l:"Action (5 min)",v:r.action},{l:"Projet",v:r.projet},
    {l:"Conviction",v:`${r.convictionAvant}% → ${r.convictionApres}%`},
    {l:"Intensité",v:`${r.intensiteInit} → ${r.intensiteApres}`},{l:"Note",v:r.noteLibre}
  ];
  return `<button class="back-btn" onclick="setView('history')">← Retour</button>
<h2>Détail séance</h2>
${fields.filter(f=>f.v).map(f=>`<div class="card"><div class="card-label">${f.l}</div><div>${esc(f.v)}</div></div>`).join("")}
<button class="btn btn-danger mt16" onclick="state.records=state.records.filter(x=>x.id!==${r.id});saveRecords(state.records);setView('history')">🗑️ Supprimer</button>`;
}

function renderSettings(){
  return `<button class="back-btn" onclick="setView('home')">← Retour</button>
<h2>⚙️ Paramètres</h2>
<div class="card">
<div style="font-weight:700;margin-bottom:8px">Clé API Anthropic</div>
<p class="sub">Nécessaire pour les suggestions IA. Gratuite sur console.anthropic.com</p>
<input class="api-input" type="password" placeholder="sk-ant-..." value="${state.apiKey}" id="apiKeyInput"/>
<button class="btn btn-primary mt8" onclick="state.apiKey=document.getElementById('apiKeyInput').value;localStorage.setItem('tcc_apikey',state.apiKey);alert('✅ Clé sauvegardée !')">Sauvegarder</button>
</div>
<div class="card mt12">
<div style="font-weight:700;margin-bottom:8px">Données</div>
<p class="sub">${state.records.length} séance(s) enregistrée(s)</p>
<div style="display:flex;gap:8px;margin-top:8px">
<button class="btn-sm" onclick="exportTxt()">📄 Export TXT</button>
<button class="btn-sm" onclick="exportJson()">💾 Export JSON</button>
</div>
</div>
<div class="card mt12">
<div style="font-weight:700;margin-bottom:8px">Installer l'app</div>
<p class="sub">iPhone : Safari → Partager → Sur l'écran d'accueil</p>
<p class="sub">Android : Chrome → Menu → Ajouter à l'écran d'accueil</p>
</div>`;
}

function renderNew(){
  const f=state.form;
  const load=field=>state.ai.loading&&state.ai.field===field;
  let content="";

  if(state.step==="pensee"){
    content=`<h2>💭 Quelle est la voix intérieure ?</h2>
<p class="sub">Ce que la voix dit, mot pour mot.</p>
<textarea id="penseeInput" rows="5" placeholder="Ex : Je suis incompétent, je n'y arriverai jamais..."
  onblur="setForm('pensee',this.value)">${esc(f.pensee)}</textarea>
<div class="mt16">
<p class="sub">Niveau de conviction : <span class="strong">${f.convictionAvant}%</span></p>
<input type="range" min="0" max="100" value="${f.convictionAvant}" oninput="setForm('convictionAvant',+this.value)"/>
</div>
${navRow(f.pensee.trim().length>0||true)}`;

  }else if(state.step==="manifestation"){
    content=`<h2>🔍 Comment ça se manifeste ?</h2>
<p class="sub">Distorsions cognitives</p>
<div class="wrap">${tags(DISTORSIONS,f.distorsions,"distorsions")}</div>
<p class="sub">Émotions</p>
<div class="wrap">${tags(EMOTIONS,f.emotions,"emotions")}</div>
<p class="sub">Comportements</p>
<div class="wrap">${tags(COMPORTEMENTS,f.comportements,"comportements")}</div>
<p class="sub">Intensité émotionnelle : <span class="strong">${f.intensiteInit}/100</span></p>
<input type="range" min="0" max="100" value="${f.intensiteInit}" oninput="setForm('intensiteInit',+this.value)"/>
${navRow()}`;

  }else if(state.step==="norme"){
    // Normes suggérées selon distorsions
    const normesAuto = [...new Set(
      f.distorsions.flatMap(d => (DISTORSION_DATA[d]?.normes||[]))
    )];
    content=`<h2>⚖️ Quelle est la norme ?</h2>
<p class="sub">Le fait objectif et universel qui permet d'analyser cette voix.</p>
${normesAuto.length>0?`
<div style="font-size:.75rem;color:#a78bfa;margin-bottom:8px;font-weight:600">📌 Normes selon tes distorsions</div>
${normesAuto.map(n=>`<div class="card mb8" style="cursor:pointer" onclick="setForm('norme','${n.replace(/'/g,"\\'")}')">
<div style="font-size:.85rem;color:#e9d5ff">${esc(n)}</div>
<div style="font-size:.7rem;color:#7c3aed;margin-top:4px">Appuie pour utiliser</div>
</div>`).join("")}
<div style="font-size:.75rem;color:#9ca3af;margin:12px 0 8px;font-weight:600">✏️ Ou écris la tienne</div>
`:`<p class="sub" style="color:#6b7280">Sélectionne des distorsions à l'étape précédente pour voir des normes suggérées.</p>`}
<textarea rows="4" placeholder="Ex : La perfection n'existe pas..."
  onblur="setForm('norme',this.value)">${esc(f.norme)}</textarea>
${navRow()}`;

  }else if(state.step==="analyse"){
    const questionsAuto = [...new Set(
      f.distorsions.flatMap(d => (DISTORSION_DATA[d]?.questions||[]))
    )];
    content=`<h2>🗣️ Analyse</h2>
<p class="sub">Questions pour challenger la voix.</p>
${questionsAuto.length>0?`
<div style="font-size:.75rem;color:#a78bfa;margin-bottom:8px;font-weight:600">📌 Questions selon tes distorsions</div>
${questionsAuto.map((q,i)=>`<div class="card mb8">
<div style="font-size:.85rem;font-weight:600;color:#a78bfa;margin-bottom:8px">${esc(q)}</div>
<textarea rows="3" placeholder="Ta réponse..."
  onblur="state.form.reponses['auto_${i}']=this.value"
>${esc(f.reponses[`auto_${i}`]||"")}</textarea>
</div>`).join("")}`:`<p class="sub" style="color:#6b7280">Sélectionne des distorsions à l'étape précédente pour voir des questions suggérées.</p>`}
<div style="font-size:.75rem;color:#9ca3af;margin:16px 0 8px;font-weight:600">✏️ Mes questions personnelles</div>
${(f.questions||[]).map((q,i)=>`<div class="card mb8" style="position:relative">
<div style="font-size:.85rem;font-weight:600;color:#d4d4d8;margin-bottom:8px">${esc(q)}</div>
<textarea rows="3" placeholder="Ta réponse..."
  onblur="state.form.reponses['custom_${i}']=this.value"
>${esc(f.reponses[`custom_${i}`]||"")}</textarea>
<button onclick="state.form.questions.splice(${i},1);render()" style="position:absolute;top:8px;right:8px;background:none;border:none;color:#6b7280;cursor:pointer;font-size:.8rem">✕</button>
</div>`).join("")}
<div class="card" style="border:1px dashed #374151;background:transparent">
<div style="font-size:.75rem;color:#9ca3af;margin-bottom:6px">+ Ajouter ma propre question</div>
<textarea rows="2" placeholder="Ex : Est-ce que j'ai déjà vécu ça et m'en suis sorti ?" id="newQ"></textarea>
<button class="btn btn-secondary mt8" style="padding:8px;font-size:.8rem" onclick="
  const q=document.getElementById('newQ').value.trim();
  if(q){state.form.questions=[...(state.form.questions||[]),q];render();}
">Ajouter</button>
</div>
${navRow()}`;

  }else if(state.step==="contrearguments"){
    content=`<h2>🛡️ Contre-arguments</h2>
<p class="sub">L'IA puise dans ta carte de valeur pour te répondre personnellement.</p>
<button class="btn btn-primary mb12" onclick="askAI('contre')" ${load("contre")?"disabled":""}>${aiBtnTxt("contre","🤖 Générer depuis ma carte de valeur")}</button>
${aiBox(f.contreAI,"contre","setForm('contrearguments',state.form.contreAI)")}
<textarea rows="5" placeholder="Tes contre-arguments..."
  onblur="setForm('contrearguments',this.value)">${esc(f.contrearguments)}</textarea>
${navRow()}`;

  }else if(state.step==="ecart"){
    content=`<h2>📐 Écart constaté</h2>
<p class="sub">Ce qui sépare la voix de la norme.</p>
<button class="btn btn-primary mb12" onclick="askAI('ecart')" ${load("ecart")?"disabled":""}>${aiBtnTxt("ecart","🤖 Analyser l'écart")}</button>
${aiBox(f.ecartAI,"ecart","setForm('ecart',state.form.ecartAI)")}
<textarea rows="4" placeholder="L'écart entre la voix et la norme..."
  onblur="setForm('ecart',this.value)">${esc(f.ecart)}</textarea>
${navRow()}`;

  }else if(state.step==="besoin"){
    content=`<h2>🎯 Besoins & Actions</h2>
<p class="sub">Quel besoin se cache derrière ? Que faire ?</p>
<button class="btn btn-primary mb12" onclick="askAI('besoins')" ${load("besoins")?"disabled":""}>${aiBtnTxt("besoins","🤖 Identifier besoins & actions")}</button>
${load("besoins")?`<p class="sub pulse" style="text-align:center">Génération en cours...</p>`:""}
<span class="label">Besoins identifiés</span>
<textarea rows="3" placeholder="Ex : Confiance en soi, clarté..."
  onblur="setForm('besoins',this.value)" class="mb12">${esc(f.besoins)}</textarea>
<span class="label">⚡ Action immédiate (5 min)</span>
<textarea rows="3" placeholder="Ex : Respirer 5 min..."
  onblur="setForm('action',this.value)" class="mb12">${esc(f.action)}</textarea>
<span class="label">🗓️ Projet (long terme)</span>
<textarea rows="3" placeholder="Ex : Méditer chaque jour..."
  onblur="setForm('projet',this.value)">${esc(f.projet)}</textarea>
${navRow()}`;

  }else if(state.step==="evaluation"){
    const cd=f.convictionAvant-f.convictionApres;
    const id=f.intensiteInit-f.intensiteApres;
    content=`<h2>📊 Évaluation</h2>
<div class="card italic mb12">"${esc(f.pensee)}"</div>
<p class="sub">Conviction maintenant : <span class="strong">${f.convictionApres}%</span></p>
<input type="range" min="0" max="100" value="${f.convictionApres}" oninput="setForm('convictionApres',+this.value)"/>
<p class="sub mt12">Intensité émotionnelle maintenant : <span class="strong">${f.intensiteApres}/100</span></p>
<input type="range" min="0" max="100" value="${f.intensiteApres}" oninput="setForm('intensiteApres',+this.value)"/>
<div class="stat-grid mt16">
<div class="stat-card"><div class="card-label">Conviction</div>
<div class="stat-val ${cd>0?"green":"orange"}">${cd>0?"-":"+"} ${Math.abs(cd)}%</div></div>
<div class="stat-card"><div class="card-label">Intensité</div>
<div class="stat-val ${id>0?"green":"orange"}">${id>0?"-":"+"} ${Math.abs(id)}</div></div>
</div>
<span class="label">Note libre</span>
<textarea rows="4" placeholder="Comment tu te sens après cette séance ?"
  onblur="setForm('noteLibre',this.value)">${esc(f.noteLibre)}</textarea>
${navRow()}`;
  }

  return `<button class="back-btn" onclick="setView('home')">← Annuler</button>
${progressBar()}${content}`;
}

// =====================================================
// MAIN RENDER
// =====================================================
function render(){
  const app=document.getElementById("app");
  let html="";
  if(state.view==="home") html=renderHome();
  else if(state.view==="new") html=renderNew();
  else if(state.view==="history") html=renderHistory();
  else if(state.view==="detail") html=renderDetail();
  else if(state.view==="carte") html=renderCarte();
  else if(state.view==="settings") html=renderSettings();
  app.innerHTML=html;
}

render();
</script>
</body>
</html>
